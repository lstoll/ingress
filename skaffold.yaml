apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: ingress-dev
build:
  local:
    push: false
  artifacts:
    - image: ingress
      context: .
      docker:
        dockerfile: Dockerfile
manifests:
  kustomize:
    paths:
      - deploy/dev
deploy:
  kubectl: {}
profiles:
  - name: terminate
    manifests:
      kustomize:
        paths:
          - deploy/dev-terminate
