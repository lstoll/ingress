apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
    spec:
      serviceAccountName: ingress
      containers:
        - name: ingress
          image: ingress
          imagePullPolicy: IfNotPresent
          command:
            - /ingress
          args:
            - --instance=ingress1
            - --cert-mode=self-signed
            - --http-listen=0.0.0.0:80
            - --https-redirect-port=8443
          ports:
            - containerPort: 443
              name: tls
            - containerPort: 80
              name: http
