apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress
spec:
  gatewayClassName: ingress-dev
  listeners:
    - name: pass-tls
      protocol: TLS
      port: 443
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
    - name: term-tls
      protocol: TLS
      port: 4443
      tls:
        mode: Terminate
      allowedRoutes:
        namespaces:
          from: Same
